<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: white; display: flex; align-items: center; height: 100vh; }
        .modal-card { background: white; border-radius: 12px; padding: 40px; max-width: 450px; margin: auto; text-align: center; }
        .btn-delete { background-color: #8B0000; color: white; border-radius: 8px; padding: 12px; font-weight: bold; width: 100%; margin-bottom: 12px; border: none; }
        .btn-keep { background-color: #77B347; color: white; border-radius: 8px; padding: 12px; font-weight: bold; width: 100%; border: none; text-decoration: none; display: block; }
        .warning-text { font-size: 1.2rem; font-weight: 600; color: #2B2D33; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="modal-card">
        <p class="warning-text">¿Estás seguro de eliminar este producto? Esta acción no se puede deshacer.</p>
        <form method="POST">
             {% csrf_token %}
            <button type="submit" class="btn-delete">Sí, Eliminar Permanentemente</button>
            <a href="{% url 'productos:inventario' %}" class="btn-keep">Cancelar</a>
        </form>
    </div>
</body>
</html>
