<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Producto - Juan del Sur</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  body {
    background: #2B2D33;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
  }
  
  .card-crear {
    max-width: 500px;
    width: 100%;
    background: #EAEAEA;
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  
  .card-header {
    background: #E0E0E0;
    padding: 20px 24px;
    border-bottom: 3px solid #0671B8;
  }
  
  .card-header h4 {
    margin: 0;
    color: #1F1F1F;
    font-weight: 700;
  }
  
  .card-body {
    padding: 28px 24px;
  }
  
  .form-label {
    font-weight: 600;
    color: #1F1F1F;
    margin-bottom: 6px;
  }
  
  .form-control, .form-select {
    background: white;
    border: 1px solid #ced4da;
    border-radius: 16px;
    padding: 10px 16px;
  }
  
  .form-control:focus, .form-select:focus {
    border-color: #0671B8;
    box-shadow: 0 0 0 3px rgba(6,113,184,0.2);
    outline: none;
  }
  
  .btn-crear {
    background: #0671B8;
    border: none;
    border-radius: 40px;
    padding: 12px;
    font-weight: 600;
    font-size: 1rem;
    width: 100%;
    color: white;
    transition: 0.2s;
  }
  
  .btn-crear:hover {
    background: #055A9A;
    transform: translateY(-2px);
  }
  
  .btn-cancelar {
    background: #6C757D;
    border: none;
    border-radius: 40px;
    padding: 12px;
    font-weight: 600;
    width: 100%;
    color: white;
    margin-top: 12px;
    transition: 0.2s;
    display: inline-block;
    text-align: center;
    text-decoration: none;
  }
  
  .btn-cancelar:hover {
    background: #5a6268;
    color: white;
  }
</style>
</head>
<body>

<div class="card-crear">
  <div class="card-header">
    <h4><i class="fas fa-plus-circle me-2" style="color:#0671B8;"></i> Crear Nuevo Producto</h4>
  </div>
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}
      
      <div class="mb-3">
        <label class="form-label">Nombre del Producto</label>
        <input type="text" name="nombre" id="prodNombre" class="form-control" placeholder="Ej: Coca Cola 2L" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Categoría</label>
        <select name="categoria" id="prodCategoria" class="form-select" required>
          {% for cat in categorias %}
            <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Precio de Compra (USD)</label>
        <input type="number" name="precio_compra" id="prodPrecioCompra" class="form-control" placeholder="Precio de compra" step="0.01" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Precio de Venta (USD)</label>
        <input type="number" name="precio_venta" id="prodPrecioVenta" class="form-control" placeholder="Precio de venta" step="0.01" required>
      </div>
      
      <div class="mb-4">
        <label class="form-label">Stock Inicial</label>
        <input type="number" name="stock" id="prodStock" class="form-control" placeholder="Cantidad en inventario" step="1" required>
      </div>
      
      <button type="submit" class="btn-crear">
        <i class="fas fa-save me-2"></i> Guardar Producto
      </button>
      
      <!-- Opción 3: Usar un enlace como botón (más simple) -->
      <a href="{% url 'productos:inventario' %}" class="btn-cancelar">
        <i class="fas fa-arrow-left me-2"></i> Cancelar
      </a>
    </form>
  </div>
</div>

<script>
  // Validación adicional en cliente
  document.querySelector('form').addEventListener('submit', function(e) {
    let precioCompra = parseFloat(document.getElementById('prodPrecioCompra').value);
    let precioVenta = parseFloat(document.getElementById('prodPrecioVenta').value);
    
    if (precioVenta <= precioCompra) {
      e.preventDefault();
      alert('⚠️ El precio de venta debe ser mayor al precio de compra para tener ganancia');
    }
  });
</script>
</body>
</html>
