<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Producto - Juan del Sur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      background: #2B2D33;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }

    .card-editar {
      max-width: 500px;
      width: 100%;
      background: #EAEAEA;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .card-header {
      background: #E0E0E0;
      padding: 20px 24px;
      border-bottom: 3px solid #0671B8;
    }

    .card-header h4 {
      margin: 0;
      color: #1F1F1F;
      font-weight: 700;
    }

    .card-body {
      padding: 28px 24px;
    }

    .form-label {
      font-weight: 600;
      color: #1F1F1F;
      margin-bottom: 6px;
    }

    .form-control,
    .form-select {
      background: white;
      border: 1px solid #ced4da;
      border-radius: 16px;
      padding: 10px 16px;
    }

    .estado-radio {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }

    .btn-actualizar {
      background: #0671B8;
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      color: white;
    }

    .btn-actualizar:hover {
      background: #055A9A;
    }

    .btn-cancelar {
      background: #6C757D;
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      color: white;
      margin-top: 12px;
      display: inline-block;
      text-align: center;
      text-decoration: none;
    }

    .btn-cancelar:hover {
      background: #5a6268;
      color: white;
    }
  </style>
</head>

<body>

  <div class="card-editar">
    <div class="card-header">
      <h4><i class="fas fa-edit me-2" style="color:#0671B8;"></i> Editar Producto</h4>
    </div>
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Código</label>
          <input type="text" name="codProducto" class="form-control" value="{{ producto.codProducto }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Nombre del Producto</label>
          <input type="text" name="nomProducto" class="form-control" value="{{ producto.nomProducto }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Categoría</label>
          <select name="categoria" class="form-select" required>
            {% for cat in categorias %}
              <option value="{{ cat.id }}"
                {% if producto.categoria.id == cat.id %}selected{% endif %}>
                {{ cat.nomCategoria }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Precio de Compra</label>
          <input type="text" name="precioCompra" class="form-control" value="{{ producto.precioCompra }}" step="0.01" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Precio de Venta</label>
          <input type="text" name="precioVenta" class="form-control" value="{{ producto.precioVenta }}" step="0.01" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Stock</label>
          <input type="number" name="stockActual" class="form-control" value="{{ producto.stockActual }}" step="1" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo de Unidad</label>
          <select name="tipoUnidad" class="form-select" required>
            {% for und in unidades %}
              <option value="{{ und }}" {% if producto.tipoUnidad == und %}selected{% endif %}>{{ und }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label">Estado</label>
          <div class="estado-radio">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="estado" value="activo" id="activo" {% if producto.estado == 'activo' %}checked{% endif %}>
              <label class="form-check-label" for="activo">Activo</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="estado" value="inactivo" id="inactivo" {% if producto.estado == 'inactivo' %}checked{% endif %}>
              <label class="form-check-label" for="inactivo">Inactivo</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-actualizar">
          <i class="fas fa-save me-2"></i> Actualizar Producto
        </button>

        <button type="button" class="btn-cancelar" onclick="cancelarEdicion()">
          <i class="fas fa-arrow-left me-2"></i> Cancelar
        </button>
      </form>
    </div>
  </div>

  <script>
    function cancelarEdicion() {
      window.location.href = "{% url 'productos:inventario' %}";
    }
  </script>
</body>

</html>
