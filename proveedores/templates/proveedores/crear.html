<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Proveedor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
  background:#2B2D33;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Segoe UI', system-ui, sans-serif;
}

/* CARD */
.card-custom {
  width:420px;
  background:#EAEAEA;
  border-radius:28px;
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
  overflow:hidden;
}

/* HEADER */
.card-header {
  background:#E0E0E0;
  padding:16px 20px;
  border-bottom:3px solid #0671B8;
}

/* BOTÓN VOLVER */
.btn-volver {
  background:#6C757D;
  border:none;
  border-radius:40px;
  padding:6px 14px;
  color:white;
  text-decoration:none;
  font-weight:600;
}

.btn-volver:hover {
  background:#5a6268;
  color:white;
}
</style>
</head>

<body>

<div class="card-custom">

  <!-- HEADER -->
  <div class="card-header d-flex justify-content-between align-items-center">

    <h5 class="mb-0">
      <i class="fas fa-plus-circle me-2" style="color:#0671B8;"></i>
      Nuevo Proveedor
    </h5>

    <!-- BOTÓN MENÚ -->
    <a href="{% url 'dashboard_admin' %}" class="btn-volver">
      <i class="fas fa-arrow-left"></i>
    </a>

  </div>

  <!-- BODY -->
  <div class="p-4">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% else %}success{% endif %} alert-dismissible fade show">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <input name="nomProv" class="form-control mb-2" placeholder="Nombre" required>
      <input name="email" class="form-control mb-2" placeholder="Email">
      <input name="telefono" class="form-control mb-2" placeholder="Teléfono">
      <input name="direccion" class="form-control mb-3" placeholder="Dirección">

      <button class="btn btn-primary w-100">Guardar</button>

      <a href="{% url 'proveedores:lista' %}" class="btn btn-secondary w-100 mt-2">
        Cancelar
      </a>

    </form>

  </div>

</div>

</body>
</html>
