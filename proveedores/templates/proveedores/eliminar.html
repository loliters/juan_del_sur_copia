<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eliminar Proveedor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#2B2D33; display:flex; justify-content:center; align-items:center; height:100vh;">

<div class="card p-4 text-center" style="width:400px; border-radius:20px;">

<h4>Eliminar Proveedor</h4>

<p>¿Seguro que deseas eliminar <b>{{ proveedor.nomProv }}</b>?</p>

<form method="POST">
{% csrf_token %}
<button class="btn btn-danger w-100">Eliminar</button>
</form>

<a href="{% url 'proveedores:lista' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>

</div>

</body>
</html>
