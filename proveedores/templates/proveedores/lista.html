<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proveedores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
  background:#2B2D33;
  font-family:'Segoe UI', system-ui, sans-serif;
}

/* CARD */
.card-custom {
  background:#EAEAEA;
  border-radius:28px;
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
  overflow:hidden;
}

/* HEADER */
.card-header {
  background:#E0E0E0;
  border-bottom:3px solid #0671B8;
  padding:16px 20px;
}

/* BOTONES */
.btn-crear {
  background:#0671B8;
  border:none;
  border-radius:40px;
  color:white;
  font-weight:600;
}

.btn-crear:hover {
  background:#055A9A;
}

.btn-volver {
  background:#6C757D;
  border:none;
  border-radius:40px;
  padding:6px 14px;
  color:white;
  font-weight:600;
  text-decoration:none;
}

.btn-volver:hover {
  background:#5a6268;
  color:white;
}

/* TABLA */
.table {
  border-radius:12px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="container mt-4">

  <div class="card-custom">

    <!-- HEADER -->
    <div class="card-header d-flex justify-content-between align-items-center">

      <!-- IZQUIERDA -->
      <div class="d-flex align-items-center gap-2">
        <a href="{% url 'dashboard_admin' %}" class="btn-volver">
          <i class="fas fa-arrow-left"></i>
        </a>

        <h4 class="m-0">
          <i class="fas fa-truck me-2" style="color:#0671B8;"></i>
          Proveedores
        </h4>
      </div>

      <!-- DERECHA -->
      <a href="{% url 'proveedores:crear' %}" class="btn-crear px-3 py-2">
        <i class="fas fa-plus me-1"></i> Nuevo
      </a>

    </div>

    <!-- BODY -->
    <div class="p-3">

      {% if messages %}
        {% for m in messages %}
          <div class="alert alert-success alert-dismissible fade show">
            {{ m }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}

      <div class="table-responsive">
        <table class="table table-hover bg-white align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Dirección</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>

          <tbody>
            {% for p in proveedores %}
            <tr>
              <td>{{ p.id }}</td>
              <td class="fw-semibold">{{ p.nomProv }}</td>
              <td>{{ p.email }}</td>
              <td>{{ p.telefono }}</td>
              <td>{{ p.direccion }}</td>

              <td class="text-center">
                <a href="{% url 'proveedores:editar' p.id %}" class="me-2" title="Editar">
                  <i class="fas fa-edit text-warning"></i>
                </a>

                <a href="{% url 'proveedores:eliminar' p.id %}" title="Eliminar">
                  <i class="fas fa-trash text-danger"></i>
                </a>
              </td>
            </tr>

            {% empty %}
            <tr>
              <td colspan="5" class="text-center">
                <i class="fas fa-box-open me-2"></i>
                No hay proveedores registrados
              </td>
            </tr>
            {% endfor %}
          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
