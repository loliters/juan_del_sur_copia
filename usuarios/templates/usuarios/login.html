<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Supermercado Juan Del Sur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% load static %}

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #2B2D33;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      background: white;
      transition: transform 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-5px);
    }

    .btn-custom {
      background-color: #0671B8;
      color: white;
      font-weight: 600;
      padding: 10px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #055a9a;
      transform: scale(0.98);
    }

    .logo {
      max-height: 70px;
      margin-bottom: 15px;
    }

    h6 {
      color: #2B2D33;
      font-weight: 600;
      margin-bottom: 20px;
    }

    label {
      font-weight: 500;
      color: #495057;
      margin-bottom: 5px;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #ced4da;
      padding: 10px 12px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #0671B8;
      box-shadow: 0 0 0 0.2rem rgba(6, 113, 184, 0.25);
    }

    /* Estilos para alertas */
    .alert {
      border-radius: 10px;
      border: none;
      padding: 12px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-danger {
      background-color: #f8d7da;
      color: #721c24;
      border-left: 4px solid #dc3545;
    }

    .alert-success {
      background-color: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .alert-warning {
      background-color: #fff3cd;
      color: #856404;
      border-left: 4px solid #ffc107;
    }

    .alert i {
      font-size: 1.2rem;
    }

    a {
      color: #0671B8;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      color: #055a9a;
      text-decoration: underline;
    }

    small {
      color: #6c757d;
    }

    /* Animación para los mensajes */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert {
      animation: slideDown 0.5s ease;
    }
  </style>
</head>

<body>

<div class="card login-card text-center bg-white">

  <!-- LOGO -->
  <img src="{% static 'usuarios/IMAGES/logoJuanDelSur.jpg' %}" class="logo" alt="Logo Juan Del Sur">

  <h6>Supermercado Juan Del Sur</h6>
  <small class="text-muted mb-3">Sucursal Los Pinos</small>

  <!-- MENSAJES DE DJANGO -->
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
        <i class="bi 
          {% if message.tags == 'error' %}bi-x-circle-fill
          {% elif message.tags == 'success' %}bi-check-circle-fill
          {% elif message.tags == 'warning' %}bi-exclamation-triangle-fill
          {% else %}bi-info-circle-fill{% endif %}"></i>
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}

  <!-- FORMULARIO DE LOGIN -->
  <form method="POST">
    {% csrf_token %}

    <div class="mb-3 text-start">
      <label>
        <i class="bi bi-envelope-fill me-1"></i> Correo Electrónico
      </label>
      <input type="email" 
             name="email" 
             class="form-control" 
             required 
             placeholder="correo@juandelsur.com"
             value="{{ request.POST.email|default:'' }}">
    </div>

    <div class="mb-3 text-start">
      <label>
        <i class="bi bi-lock-fill me-1"></i> Contraseña
      </label>
      <input type="password" 
             name="password" 
             class="form-control" 
             required 
             placeholder="Ingrese su contraseña">
    </div>

    <button type="submit" class="btn btn-custom w-100">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>

  <div class="mt-3 pt-2 border-top">
    <small>
      ¿No tienes cuenta?
      <a href="{% url 'register' %}">
        <i class="bi bi-person-plus-fill"></i> Registrarse
      </a>
    </small>
    <br>
    <small class="text-muted">
      <i class="bi bi-shield-check"></i> Sistema seguro
    </small>
  </div>

</div>

<!-- Bootstrap JS para cerrar alertas -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Ocultar mensajes automáticamente después de 5 segundos
  setTimeout(function() {
    const alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert) {
      const bsAlert = new bootstrap.Alert(alert);
      bsAlert.close();
    });
  }, 5000);
</script>

</body>
</html>
