<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Compra</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); border: none; border-radius: 10px; }
        .card-header { background-color: #fff; border-bottom: 2px solid #e9ecef; border-radius: 10px 10px 0 0 !important; padding: 1.5rem; }
        .btn-primary { background-color: #2563eb; border-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-success { background-color: #16a34a; border-color: #16a34a; }
        .alert-primary { background-color: #2563eb; color: white; border: none; }
        .producto-card { background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .modal-custom { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1050; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-plus-circle text-primary"></i> Crear Compra</h3>
            </div>
            <div class="card-body">
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
                
                <form method="POST" id="formCompra">
                    {% csrf_token %}
                    
                    <!-- Fecha -->
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-calendar"></i> Fecha y hora</label>
                        <div class="input-group">
                            <input type="datetime-local" name="fecha" class="form-control" 
                                   value="{% now 'Y-m-d\TH:i' %}" required>
                            <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                        </div>
                        <small class="text-muted"><i class="fas fa-info-circle"></i> Formato: AAAA-MM-DD HH:MM</small>
                    </div>

                    <!-- Proveedor -->
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-truck"></i> Proveedor</label>
                        <select name="proveedor_id" class="form-select" required>
                            <option value="">Seleccione un proveedor</option>
                            {% for proveedor in proveedores %}
                            <option value="{{ proveedor.id }}">
                                {{ proveedor.nomProv }}{% if proveedor.telefono %} - {{ proveedor.telefono }}{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Productos -->
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-box"></i> Productos en la compra</label>
                        
                        <!-- Buscador + Botón nuevo producto -->
                        <div class="input-group mb-3">
                            <input type="text" id="buscarProducto" class="form-control" 
                                   placeholder="Buscar producto por código o nombre...">
                            <button class="btn btn-outline-secondary" type="button" id="btnBuscar">
                                <i class="fas fa-search"></i>
                            </button>
                            <a href="{% url 'productos:registrar' %}?next={{ request.path }}{% if proveedor_seleccionado %}&proveedor={{ proveedor_seleccionado }}{% endif %}" 
                               class="btn btn-outline-primary" target="_blank" title="Registrar nuevo producto">
                                <i class="fas fa-plus"></i>
                            </a>
                        </div>
                        
                        <!-- Lista de productos agregados -->
                        <div id="listaProductos"></div>
                        
                        <!-- Botón agregar más -->
                        <button type="button" class="btn btn-success w-100 mt-2" id="btnAgregarProducto" style="display:none;" onclick="agregarMasProductos()">
                            <i class="fas fa-plus"></i> Agregar más productos
                        </button>
                    </div>

                    <!-- Total -->
                    <div class="alert alert-primary">
                        <h4 class="mb-0 d-flex justify-content-between align-items-center">
                            <span>Total:</span>
                            <span id="totalCompra">Bs 0.00</span>
                        </h4>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-save"></i> Guardar Compra
                        </button>
                        <a href="{% url 'compras:ver_compras' %}" class="btn btn-secondary flex-fill">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>

                    <!-- ✅ Campo oculto para productos (DENTRO del form) -->
                    <div id="productosContainer"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
    let carritoCompra = [];

    // Event listeners
    document.getElementById('btnBuscar').addEventListener('click', buscarProductos);
    document.getElementById('buscarProducto').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') buscarProductos();
    });

    function buscarProductos() {
        const query = document.getElementById('buscarProducto').value.trim();
        if (!query) { alert('Ingresa un código o nombre de producto'); return; }

        fetch("{% url 'compras:buscar_productos_ajax' %}?q=" + encodeURIComponent(query))
            .then(response => response.json())
            .then(data => {
                if (data.success && data.productos && data.productos.length > 0) {
                    mostrarResultadosBusqueda(data.productos);
                } else {
                    alert('No se encontraron productos. Verifica el nombre o código.');
                }
            })
            .catch(error => { console.error('Error:', error); alert('Error al buscar productos'); });
    }

    function mostrarResultadosBusqueda(productos) {
        const modalExistente = document.querySelector('.modal-custom');
        if (modalExistente) modalExistente.remove();
        
        const modal = document.createElement('div');
        modal.className = 'modal-custom';
        modal.innerHTML = `
            <div class="modal-dialog modal-lg" style="max-width: 900px; width: 90%;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Seleccionar Producto</h5>
                        <button type="button" class="btn-close" onclick="cerrarModal()"></button>
                    </div>
                    <div class="modal-body">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Cantidad</th><th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${productos.map(p => `
                                    <tr>
                                        <td><small class="text-muted">${p.codProducto}</small></td>
                                        <td><strong>${p.nomProducto}</strong></td>
                                        <td>Bs ${parseFloat(p.precioCompra).toFixed(2)}</td>
                                        <td><span class="badge ${p.stockActual > 0 ? 'bg-success' : 'bg-danger'}">${p.stockActual}</span></td>
                                        <td><input type="number" id="qty-${p.codProducto}" class="form-control form-control-sm" value="1" min="1" max="${p.stockActual}" style="width: 70px;"></td>
                                        <td><button class="btn btn-sm btn-primary" onclick="agregarProducto('${p.codProducto}', '${p.nomProducto.replace(/'/g, "\\'")}', ${p.precioCompra}, '${p.codProducto}')"><i class="fas fa-plus"></i> Agregar</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }

    function cerrarModal() {
        const modal = document.querySelector('.modal-custom');
        if (modal) modal.remove();
    }

    function agregarProducto(cod, nombre, precioCompra, codInput) {
        const inputCantidad = document.getElementById(`qty-${codInput}`);
        const cantidad = parseInt(inputCantidad?.value) || 1;
        if (cantidad < 1) { alert('La cantidad debe ser al menos 1'); return; }

        const item = {
            cod: cod, nombre: nombre,
            precio_compra: parseFloat(precioCompra) || 0,
            cantidad: cantidad,
            subtotal: (parseFloat(precioCompra) || 0) * cantidad
        };

        const existente = carritoCompra.find(i => i.cod === cod);
        if (existente) {
            existente.cantidad += cantidad;
            existente.subtotal = existente.precio_compra * existente.cantidad;
        } else {
            carritoCompra.push(item);
        }

        actualizarListaProductos();
        cerrarModal();
        document.getElementById('buscarProducto').value = '';
    }

    function actualizarListaProductos() {
        const container = document.getElementById('listaProductos');
        const productosContainer = document.getElementById('productosContainer');
        
        if (carritoCompra.length === 0) {
            container.innerHTML = '<p class="text-muted small">No hay productos agregados</p>';
            productosContainer.innerHTML = '';
            document.getElementById('totalCompra').textContent = 'Bs 0.00';
            document.getElementById('btnAgregarProducto').style.display = 'none';
            return;
        }
        
        container.innerHTML = carritoCompra.map((item, index) => `
            <div class="producto-card">
                <div class="row align-items-center">
                    <div class="col-md-5">
                        <strong>${item.nombre}</strong><br>
                        <small class="text-muted">Bs ${parseFloat(item.precio_compra).toFixed(2)} c/u</small>
                    </div>
                    <div class="col-md-3">
                        <div class="input-group input-group-sm">
                            <button type="button" class="btn btn-outline-primary" onclick="cambiarCantidad(${index}, -1)">-</button>
                            <input type="number" class="form-control text-center" value="${item.cantidad}" readonly>
                            <button type="button" class="btn btn-outline-primary" onclick="cambiarCantidad(${index}, 1)">+</button>
                        </div>
                    </div>
                    <div class="col-md-2 text-end"><strong>Bs ${item.subtotal.toFixed(2)}</strong></div>
                    <div class="col-md-2 text-end">
                        <button type="button" class="btn btn-sm btn-danger" onclick="eliminarProducto(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
        `).join('');

        // ✅ Inputs ocultos con encoding seguro para evitar problemas con comillas
        productosContainer.innerHTML = carritoCompra.map(item => {
            const itemData = {
                cod: item.cod, nombre: item.nombre,
                precio_compra: item.precio_compra,
                cantidad: item.cantidad, subtotal: item.subtotal
            };
            const encoded = encodeURIComponent(JSON.stringify(itemData));
            return `<input type="hidden" name="productos" value="${encoded}">`;
        }).join('');

        const total = carritoCompra.reduce((sum, item) => sum + item.subtotal, 0);
        document.getElementById('totalCompra').textContent = `Bs ${total.toFixed(2)}`;
        document.getElementById('btnAgregarProducto').style.display = 'block';
    }

    function cambiarCantidad(index, cambio) {
        carritoCompra[index].cantidad += cambio;
        if (carritoCompra[index].cantidad < 1) carritoCompra[index].cantidad = 1;
        carritoCompra[index].subtotal = carritoCompra[index].precio_compra * carritoCompra[index].cantidad;
        actualizarListaProductos();
    }

    function eliminarProducto(index) {
        carritoCompra.splice(index, 1);
        actualizarListaProductos();
    }

    function agregarMasProductos() {
        document.getElementById('buscarProducto').focus();
    }

    document.addEventListener('click', function(e) {
        const modal = document.querySelector('.modal-custom');
        if (modal && e.target === modal) cerrarModal();
    });

    // ✅ Restaurar proveedor y fecha si vienen por URL
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const proveedorId = urlParams.get('proveedor_id');
        if (proveedorId) {
            const select = document.querySelector('select[name="proveedor_id"]');
            if (select) select.value = proveedorId;
        }
        const fecha = urlParams.get('fecha');
        if (fecha) {
            const inputFecha = document.querySelector('input[name="fecha"]');
            if (inputFecha) inputFecha.value = fecha;
        }
        if (proveedorId || fecha) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });
    </script>
</body>
</html>
