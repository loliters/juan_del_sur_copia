<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Cliente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% load static %}

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Iconos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-form {
      width: 100%;
      max-width: 420px;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      background: white;
    }

    .logo {
      max-height: 60px;
      margin-bottom: 5px;
    }

    h5 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      font-weight: bold;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .form-control {
      font-size: 0.9rem;
    }

    .btn-success {
      font-weight: bold;
    }

    .btn-secondary {
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card-form text-center">

  <!-- LOGO -->
  <img src="{% static 'usuarios/IMAGES/logoJuanDelSur.jpg' %}" class="logo">

  <h6>Supermercado Juan Del Sur</h6>
  <small class="text-muted">Sucursal Los Pinos</small>

  <h5 class="mt-2">Registrar Nuevo Cliente</h5>

  <!-- MENSAJES -->
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- FORMULARIO -->
  <form method="POST" autocomplete="off">
    {% csrf_token %}

    <!-- Nombre -->
    <div class="mb-2 text-start">
      <label>Nombre</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="nombre" class="form-control" placeholder="Ingrese nombre del cliente" required>
      </div>
    </div>

    <!-- Razón Social -->
    <div class="mb-2 text-start">
      <label>Razón Social</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-building"></i></span>
        <input type="text" name="razonSocial" class="form-control" placeholder="Ingrese la razón social">
      </div>
    </div>

    <!-- Carnet -->
    <div class="mb-2 text-start">
      <label>Carnet</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-card-text"></i></span>
        <input type="text" name="carnet" class="form-control" placeholder="Ingrese el carnet">
      </div>
    </div>

    <!-- Email -->
    <div class="mb-2 text-start">
      <label>Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" name="email" class="form-control" placeholder="Ingrese el email">
      </div>
    </div>

    <!-- Teléfono -->
    <div class="mb-2 text-start">
      <label>Teléfono</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
        <input type="text" name="telefono" class="form-control" placeholder="Ingrese el teléfono">
      </div>
    </div>

    <!-- Zona -->
    <div class="mb-2 text-start">
      <label>Zona</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
        <input type="text" name="zona" class="form-control" placeholder="Ingrese la zona">
      </div>
    </div>

    <!-- Calle -->
    <div class="mb-2 text-start">
      <label>Calle</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-signpost"></i></span>
        <input type="text" name="calle" class="form-control" placeholder="Ingrese la calle">
      </div>
    </div>

    <!-- Número de Casa -->
    <div class="mb-3 text-start">
      <label>Número de Casa</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-house"></i></span>
        <input type="text" name="numeroCasa" class="form-control" placeholder="Ingrese el número de casa">
      </div>
    </div>

    <!-- BOTONES -->
    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-success w-50 me-2">
        Registrar Cliente
      </button>

      <a href="#" class="btn btn-secondary w-50">
        Cancelar
      </a>
    </div>

  </form>

</div>

</body>
</html>
