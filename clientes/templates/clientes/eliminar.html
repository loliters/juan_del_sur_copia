<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Cliente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% load static %}

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Iconos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: rgba(0,0,0,0.6);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-form {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      padding: 20px;
      background: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      border-top: 4px solid #dc3545;
    }

    .titulo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .titulo h6 {
      margin: 0;
      font-weight: bold;
    }

    .alerta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #dc3545;
      font-weight: bold;
    }

    .form-control {
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .btn-danger {
      font-weight: bold;
    }

    .btn-secondary {
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card-form">

  <!-- TÍTULO -->
  <div class="titulo">
    <div class="alerta">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <h6>Eliminar Cliente</h6>
    </div>

    <a href="{% url 'clientes:lista_clientes' %}">
      <i class="bi bi-arrow-left-circle"></i>
    </a>
  </div>

  <hr>

  <p class="text-center">¿Seguro que deseas eliminar al siguiente cliente?</p>

  <!-- DATOS (solo lectura) -->
  <input type="text" class="form-control" value="Nombre: {{ cliente.nombre }}" disabled>
  <input type="text" class="form-control" value="Razón Social: {{ cliente.razonSocial }}" disabled>
  <input type="text" class="form-control" value="Carnet: {{ cliente.carnet }}" disabled>

  <!-- FORM -->
  <form method="POST">
    {% csrf_token %}

    <!-- BOTÓN ELIMINAR -->
    <button type="submit" class="btn btn-danger w-100 mb-2">
      <i class="bi bi-trash"></i> Sí, eliminar
    </button>

    <!-- CANCELAR -->
    <a href="{% url 'clientes:lista_clientes' %}" class="btn btn-secondary w-100">
      Cancelar
    </a>
  </form>

</div>

</body>
</html>
