<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Categoría</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
  background:#2B2D33;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Segoe UI', system-ui, sans-serif;
}

/* CARD */
.card-crear {
  width:420px;
  background:#EAEAEA;
  border-radius:28px;
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
  overflow:hidden;
}

/* HEADER */
.card-header {
  background:#E0E0E0;
  padding:20px 24px;
  border-bottom:3px solid #0671B8;
}

.card-header h4 {
  margin:0;
  font-weight:700;
  color:#1F1F1F;
}

/* BODY */
.card-body {
  padding:24px;
}

/* INPUT */
.form-label {
  font-weight:600;
  color:#1F1F1F;
}

.form-control {
  border-radius:16px;
  padding:10px 14px;
}

.form-control:focus {
  border-color:#0671B8;
  box-shadow:0 0 0 3px rgba(6,113,184,0.2);
}

/* BOTONES */
.btn-crear {
  background:#0671B8;
  border:none;
  border-radius:40px;
  padding:12px;
  font-weight:600;
  color:white;
  width:100%;
}

.btn-crear:hover {
  background:#055A9A;
  transform:translateY(-1px);
}

.btn-cancelar {
  background:#6C757D;
  border:none;
  border-radius:40px;
  padding:12px;
  font-weight:600;
  color:white;
  width:100%;
  margin-top:10px;
  text-decoration:none;
  display:inline-block;
  text-align:center;
}

.btn-cancelar:hover {
  background:#5a6268;
}
</style>
</head>

<body>

<div class="card-crear">

  <!-- HEADER -->
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4>
      <i class="fas fa-plus-circle me-2" style="color:#0671B8;"></i>
      Nueva Categoría
    </h4>

    <!-- VOLVER -->
    <a href="{% url 'categorias:lista' %}" class="btn-cancelar" style="width:auto; padding:6px 14px;">
      <i class="fas fa-arrow-left"></i>
    </a>
  </div>

  <!-- BODY -->
  <div class="card-body">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius:12px;">
            <i class="fas fa-exclamation-triangle me-2"></i>
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
        {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Nombre de la categoría</label>
        <input type="text" name="nomCategoria" class="form-control" placeholder="Ej: Bebidas" required>
      </div>

      <button class="btn-crear">
        <i class="fas fa-save me-2"></i> Guardar
      </button>

      <a href="{% url 'categorias:lista' %}" class="btn-cancelar">
        Cancelar
      </a>

    </form>

  </div>

</div>

</body>
</html>
