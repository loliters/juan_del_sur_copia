<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eliminar Categoría</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
  background:#2B2D33;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Segoe UI', system-ui, sans-serif;
}

/* CARD */
.card-crear {
  width:420px;
  background:#EAEAEA;
  border-radius:28px;
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
  overflow:hidden;
  text-align:center;
}

/* HEADER */
.card-header {
  background:#E0E0E0;
  padding:20px 24px;
  border-bottom:3px solid #DC3545;
}

.card-header h4 {
  margin:0;
  font-weight:700;
  color:#1F1F1F;
}

/* BODY */
.card-body {
  padding:24px;
}

/* TEXTO */
.texto-advertencia {
  font-size:15px;
  color:#333;
}

/* BOTONES */
.btn-eliminar {
  background:#DC3545;
  border:none;
  border-radius:40px;
  padding:12px;
  font-weight:600;
  color:white;
  width:100%;
}

.btn-eliminar:hover {
  background:#b02a37;
  transform:translateY(-1px);
}

.btn-cancelar {
  background:#6C757D;
  border:none;
  border-radius:40px;
  padding:12px;
  font-weight:600;
  color:white;
  width:100%;
  margin-top:10px;
  text-decoration:none;
  display:inline-block;
  text-align:center;
}

.btn-cancelar:hover {
  background:#5a6268;
}

/* NOMBRE DESTACADO */
.nombre-cat {
  font-weight:700;
  color:#DC3545;
}
</style>
</head>

<body>

<div class="card-crear">

  <!-- HEADER -->
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4>
      <i class="fas fa-exclamation-triangle me-2" style="color:#DC3545;"></i>
      Eliminar Categoría
    </h4>

    <!-- VOLVER -->
    <a href="{% url 'categorias:lista' %}" class="btn-cancelar" style="width:auto; padding:6px 14px;">
      <i class="fas fa-arrow-left"></i>
    </a>
  </div>

  <!-- BODY -->
  <div class="card-body">

    <p class="texto-advertencia">
      ¿Seguro que deseas eliminar la categoría
      <span class="nombre-cat">{{ categoria.nomCategoria }}</span>?
    </p>

    <form method="POST">
      {% csrf_token %}
      <button class="btn-eliminar">
        <i class="fas fa-trash me-2"></i> Sí, eliminar
      </button>
    </form>

    <a href="{% url 'categorias:lista' %}" class="btn-cancelar">
      Cancelar
    </a>

  </div>

</div>

</body>
</html>
